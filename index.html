<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>StudyBoard — Mi agenda universitaria</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg:#FBF6F0;
  --surface:#FFFFFF;
  --surface2:#F2EBE3;
  --border:rgba(180,150,130,0.2);
  --text:#2C2420;
  --muted:rgba(44,36,32,0.45);

  --rose:#C97B84;
  --lavender:#9B8EC4;
  --gold:#C9A96E;
  --sage:#7A9E8E;
  --coral:#E07A5F;
  --sky:#6BAED6;
}

body{
  font-family:'Mulish',Arial,Helvetica,sans-serif;
  background:var(--bg,#FBF6F0);
  color:var(--text,#2C2420);
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:var(--bg,#FBF6F0);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#loader.hide{display:none;}

/* HEADER */
header{
  background:var(--surface,#fff);
  border-bottom:1px solid var(--border);
  padding:16px;
  display:flex;
  justify-content:space-between;
}

/* KANBAN */
.kanban{
  display:flex;
  gap:16px;
  padding:20px;
}
.column{
  background:var(--surface,#fff);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  width:250px;
}

/* CARDS */
.card{
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}
.c-rose{background:#f8e9eb;}
.c-lavender{background:#eeeafd;}
.c-gold{background:#f6efe2;}
.c-sage{background:#e8f1ed;}
.c-sky{background:#e7f2fb;}

/* BOTONES */
button{
  cursor:pointer;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}
.btn{
  background:linear-gradient(135deg,var(--rose),var(--lavender));
  color:#fff;
}

/* MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
}
.overlay.active{display:flex;align-items:center;justify-content:center;}
.modal{
  background:#fff;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="loader">Cargando...</div>

<div id="app" style="display:none;">

<header>
  <h2>StudyBoard</h2>
  <button class="btn" onclick="openModal()">+ Nueva</button>
</header>

<div class="kanban">
  <div class="column">
    <h4>Pendiente</h4>
    <div id="pendiente"></div>
  </div>
  <div class="column">
    <h4>En progreso</h4>
    <div id="progreso"></div>
  </div>
  <div class="column">
    <h4>Completado</h4>
    <div id="done"></div>
  </div>
</div>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <input id="title" placeholder="Título"><br><br>
    <select id="status">
      <option value="pendiente">Pendiente</option>
      <option value="progreso">En progreso</option>
      <option value="done">Completado</option>
    </select><br><br>
    <button onclick="save()">Guardar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
 apiKey:"AIzaSy...",
 databaseURL:"https://studyboard-1f074-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

onValue(ref(db,"items"),snap=>{
 render(snap.val()||{});
});

function render(data){
 document.getElementById('pendiente').innerHTML='';
 document.getElementById('progreso').innerHTML='';
 document.getElementById('done').innerHTML='';

 Object.values(data).forEach(o=>{
  const div=document.createElement('div');
  div.className="card c-rose";
  div.innerText=o.title;

  document.getElementById(o.status).appendChild(div);
 });
}

window.openModal=()=>document.getElementById('overlay').classList.add('active');

window.save=()=>{
 const title=document.getElementById('title').value;
 const status=document.getElementById('status').value;

 push(ref(db,"items"),{title,status});
 document.getElementById('overlay').classList.remove('active');
};

/* INIT */
setTimeout(()=>{
 document.getElementById('loader').classList.add('hide');
 document.getElementById('app').style.display='block';
},1000);

</script>

</body>
</html>
