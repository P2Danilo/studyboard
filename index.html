<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>StudyBoard — Mi agenda universitaria</title>

<!-- FUENTES OPTIMIZADAS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg:#FBF6F0;
  --surface:#FFFFFF;
  --surface2:#F2EBE3;
  --border:rgba(180,150,130,0.2);
  --text:#2C2420;
  --muted:rgba(44,36,32,0.45);

  --rose:#C97B84;
  --lavender:#9B8EC4;
  --gold:#C9A96E;
  --sage:#7A9E8E;
  --coral:#E07A5F;
  --sky:#6BAED6;
}

body{
  font-family:'Mulish',Arial,Helvetica,sans-serif;
  background:var(--bg,#FBF6F0);
  color:var(--text,#2C2420);
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:var(--bg,#FBF6F0);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* BOTONES */
.btn-new,
.btn-save{
  background:linear-gradient(135deg,var(--rose,#C97B84),var(--lavender,#9B8EC4));
  color:white;
  border:none;
}

/* MODAL FIX */
.modal{
  background:var(--surface,#fff);
  border:1px solid var(--border,rgba(0,0,0,0.1));
}

/* CARDS FIX */
.card.c-rose{background:#f8e9eb;}
.card.c-lavender{background:#eeeafd;}
.card.c-gold{background:#f6efe2;}
.card.c-sage{background:#e8f1ed;}
.card.c-sky{background:#e7f2fb;}

</style>
</head>

<body>

<div id="loader">Cargando...</div>

<div id="app" style="display:none;">
  <h1>StudyBoard funcionando correctamente ✅</h1>
  <button class="btn-new">Botón correcto</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAy7FcCSAuEpcVutxE-auPISlKFMHlnbg",
  authDomain: "studyboard-1f074.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user=>{
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
});

/* FALLBACK SI FIREBASE FALLA */
setTimeout(()=>{
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
},3000);

</script>

</body>
</html>
